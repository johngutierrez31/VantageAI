name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vantageciso
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vantageciso"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Create CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5432/vantageciso"
          NEXTAUTH_URL="http://127.0.0.1:3000"
          NEXTAUTH_SECRET="ci-nextauth-secret"
          AUTH_SECRET="ci-auth-secret"
          APP_BASE_URL="http://127.0.0.1:3000"
          DEMO_MODE="true"
          DEMO_USER_EMAIL="admin@vantageciso.local"
          DEMO_TENANT_SLUG="demo-tenant"
          DEFAULT_STORAGE_PROVIDER="LOCAL"
          DEFAULT_VECTOR_PROVIDER="HASHED"
          DEFAULT_EMAIL_PROVIDER="RESEND"
          AUTH_EMAIL_FROM="no-reply@vantageciso.local"
          RESEND_API_KEY=""
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          OPENAI_MODEL="gpt-4o-mini"
          S3_ENDPOINT=""
          S3_REGION="us-east-1"
          S3_ACCESS_KEY=""
          S3_SECRET_KEY=""
          S3_BUCKET=""
          STRIPE_SECRET_KEY=""
          STRIPE_WEBHOOK_SECRET=""
          STRIPE_PRICE_STARTER=""
          STRIPE_PRICE_PRO=""
          STRIPE_PRICE_PARTNER=""
          EOF

      - name: Apply Prisma migrations
        run: npm run prisma:deploy

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Full deterministic validation
        env:
          CI: true
          APP_SERVER_SCRIPT: start
        run: npm run test:full

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            output/test
            output/full-validation-server.stdout.log
            output/full-validation-server.stderr.log
          if-no-files-found: warn
